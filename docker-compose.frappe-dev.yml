name: esrm_travel_dev

services:
  mariadb:
    image: docker.io/mariadb:11.8
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
    environment:
      MYSQL_ROOT_PASSWORD: 123
      MARIADB_AUTO_UPGRADE: 1
    volumes:
      - frappe-mariadb-data:/var/lib/mysql

  redis-cache:
    image: docker.io/redis:alpine

  redis-queue:
    image: docker.io/redis:alpine

  frappe:
    image: docker.io/frappe/bench:latest
    command: /bin/bash -lc "cd /workspace/frappe-dev/frappe-bench && bench start"
    depends_on:
      - mariadb
      - redis-cache
      - redis-queue
    environment:
      SHELL: /bin/bash
    restart: unless-stopped
    working_dir: /workspace
    volumes:
      - .:/workspace
    ports:
      - "${ESRM_FRAPPE_HTTP_PORT:-18000}:8000"
      - "${ESRM_FRAPPE_SOCKET_PORT:-19000}:9000"

volumes:
  frappe-mariadb-data:
